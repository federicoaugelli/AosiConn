<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AosiConn Trading</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        [v-cloak] { display: none; }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(147, 51, 234, 0.1) 100%);
        }
        
        .input-field {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
            outline: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .shake {
            animation: shake 0.5s ease;
        }
        
        .fade-enter-active, .fade-leave-active {
            transition: opacity 0.3s ease;
        }
        
        .fade-enter-from, .fade-leave-to {
            opacity: 0;
        }
    </style>
</head>
<body class="bg-dark-900 text-gray-100 min-h-screen flex items-center justify-center">
    <div id="app" v-cloak class="w-full max-w-md px-4">
        <!-- Logo Section -->
        <div class="text-center mb-8">
            <div class="flex items-center justify-center mb-4">
                <i data-lucide="activity" class="h-12 w-12 text-blue-500 mr-3"></i>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                    AosiConn
                </h1>
            </div>
            <p class="text-gray-400">Trading Dashboard</p>
        </div>
        
        <!-- Login Card -->
        <div class="glass-panel rounded-2xl p-8 shadow-2xl">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-semibold text-white mb-2">Welcome Back</h2>
                <p class="text-gray-400 text-sm">Sign in to access your trading dashboard</p>
            </div>
            
            <!-- Error Alert -->
            <transition name="fade">
                <div v-if="error" :class="['mb-6 p-4 rounded-lg flex items-center', errorClass]">
                    <i data-lucide="alert-circle" class="h-5 w-5 mr-2 flex-shrink-0"></i>
                    <span class="text-sm">{{ error }}</span>
                </div>
            </transition>
            
            <!-- Login Form -->
            <form @submit.prevent="handleLogin" class="space-y-6">
                <!-- Username Field -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">
                        Username
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="user" class="h-5 w-5 text-gray-500"></i>
                        </div>
                        <input
                            v-model="username"
                            type="text"
                            required
                            placeholder="Enter your username"
                            class="input-field w-full pl-10 pr-4 py-3 rounded-lg text-white placeholder-gray-500"
                            :disabled="isLoading"
                        >
                    </div>
                </div>
                
                <!-- Password Field -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">
                        Password
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="h-5 w-5 text-gray-500"></i>
                        </div>
                        <input
                            v-model="password"
                            :type="showPassword ? 'text' : 'password'"
                            required
                            placeholder="Enter your password"
                            class="input-field w-full pl-10 pr-12 py-3 rounded-lg text-white placeholder-gray-500"
                            :disabled="isLoading"
                        >
                        <button
                            type="button"
                            @click="showPassword = !showPassword"
                            class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-gray-300"
                        >
                            <i :data-lucide="showPassword ? 'eye-off' : 'eye'" class="h-5 w-5"></i>
                        </button>
                    </div>
                </div>
                
                <!-- Login Button -->
                <button
                    type="submit"
                    :disabled="isLoading || !isValid"
                    class="btn-primary w-full py-3 px-4 rounded-lg font-semibold text-white flex items-center justify-center"
                >
                    <i v-if="isLoading" data-lucide="loader-2" class="h-5 w-5 mr-2 animate-spin"></i>
                    <i v-else data-lucide="log-in" class="h-5 w-5 mr-2"></i>
                    {{ isLoading ? 'Signing in...' : 'Sign In' }}
                </button>
            </form>
            
            <!-- Footer -->
            <div class="mt-6 text-center text-sm text-gray-500">
                <p>Secure connection established</p>
            </div>
        </div>
        
        <!-- Decorative Elements -->
        <div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
            <div class="absolute top-20 left-10 w-72 h-72 bg-blue-500/10 rounded-full blur-3xl"></div>
            <div class="absolute bottom-20 right-10 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl"></div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    username: '',
                    password: '',
                    showPassword: false,
                    isLoading: false,
                    error: null,
                    errorType: null
                }
            },
            
            computed: {
                isValid() {
                    return this.username.trim().length > 0 && this.password.length > 0;
                },
                errorClass() {
                    return {
                        'error': 'bg-red-900/30 border border-red-500/50 text-red-200',
                        'success': 'bg-green-900/30 border border-green-500/50 text-green-200',
                        'info': 'bg-blue-900/30 border border-blue-500/50 text-blue-200'
                    }[this.errorType] || 'bg-red-900/30 border border-red-500/50 text-red-200';
                }
            },
            
            mounted() {
                lucide.createIcons();

                this.redirectIfSessionIsValid();
            },
            
            methods: {
                async redirectIfSessionIsValid() {
                    const token = localStorage.getItem('token');
                    if (!token) return;

                    try {
                        const response = await fetch('/auth/user', {
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });

                        if (response.ok) {
                            window.location.href = '/dashboard';
                            return;
                        }
                    } catch (error) {
                        console.error('Session validation error:', error);
                    }

                    localStorage.removeItem('token');
                },

                async handleLogin() {
                    if (!this.isValid || this.isLoading) return;
                    
                    this.isLoading = true;
                    this.error = null;
                    
                    try {
                        const response = await fetch('/auth/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                username: this.username.trim(),
                                password: this.password
                            })
                        });
                        
                        if (response.ok) {
                            const data = await response.json();
                            localStorage.setItem('token', data.access_token);
                            
                            // Show success message briefly before redirect
                            this.error = 'Login successful! Redirecting...';
                            this.errorType = 'success';
                            this.$nextTick(() => lucide.createIcons());
                            
                            setTimeout(() => {
                                window.location.href = '/dashboard';
                            }, 500);
                        } else if (response.status === 400 || response.status === 401) {
                            this.error = 'Invalid username or password';
                            this.errorType = 'error';
                            this.shakeForm();
                        } else {
                            const errorData = await response.json().catch(() => ({}));
                            this.error = errorData.detail || 'Login failed. Please try again.';
                            this.errorType = 'error';
                        }
                    } catch (error) {
                        console.error('Login error:', error);
                        this.error = 'Connection error. Please check your network and try again.';
                        this.errorType = 'error';
                    } finally {
                        this.isLoading = false;
                        this.$nextTick(() => lucide.createIcons());
                    }
                },
                
                shakeForm() {
                    const card = document.querySelector('.glass-panel');
                    card.classList.add('shake');
                    setTimeout(() => card.classList.remove('shake'), 500);
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
</content>
