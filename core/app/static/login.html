<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login — AosiConn Trading</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            950: '#020617',
                            900: '#0f172a',
                            850: '#0b1221',
                            800: '#1e293b',
                            750: '#172033',
                            700: '#334155',
                            600: '#475569',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --glass-bg: rgba(30, 41, 59, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.12);
            --accent: #3b82f6;
            --accent-2: #8b5cf6;
            --success: #10b981;
            --error: #ef4444;
        }

        [v-cloak] { display: none; }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #020617;
            min-height: 100dvh;
            overflow-x: hidden;
        }

        /* Animated background gradient */
        .bg-aurora {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.18) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.06) 0%, transparent 50%),
                #020617;
            filter: blur(0px);
        }

        .bg-aurora::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 60% 30%, rgba(59, 130, 246, 0.10) 0%, transparent 35%);
            animation: aurora 12s ease-in-out infinite alternate;
        }

        @keyframes aurora {
            0% { transform: translate(0, 0) scale(1); opacity: 0.6; }
            100% { transform: translate(-4%, 4%) scale(1.08); opacity: 1; }
        }

        /* Glass card */
        .glass-card {
            position: relative;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow:
                0 24px 80px rgba(0, 0, 0, 0.45),
                inset 0 1px 0 var(--glass-highlight);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
        }

        /* Form inputs */
        .input-field {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(15, 23, 42, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            transition: all 0.2s ease;
        }

        .input-field:focus-within {
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
            background: rgba(15, 23, 42, 0.85);
        }

        .input-field input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #f8fafc;
            padding: 14px 16px;
            font-size: 15px;
        }

        .input-field input::placeholder {
            color: #64748b;
        }

        .input-icon {
            color: #64748b;
            margin-left: 14px;
            flex-shrink: 0;
        }

        .toggle-password {
            color: #64748b;
            padding: 10px 14px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .toggle-password:hover { color: #e2e8f0; }

        /* Primary button */
        .btn-primary {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px 24px;
            border-radius: 14px;
            border: none;
            font-weight: 600;
            font-size: 15px;
            color: white;
            cursor: pointer;
            overflow: hidden;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            box-shadow:
                0 8px 24px rgba(59, 130, 246, 0.35),
                inset 0 1px 0 rgba(255,255,255,0.25);
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 32px rgba(59, 130, 246, 0.45);
        }

        .btn-primary:hover::before { opacity: 1; }

        .btn-primary:active { transform: translateY(0) scale(0.98); }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Alert */
        .alert {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            border-radius: 14px;
            font-size: 14px;
            border: 1px solid;
            animation: fadeIn 0.25s ease;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.10);
            border-color: rgba(239, 68, 68, 0.25);
            color: #fca5a5;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.10);
            border-color: rgba(16, 185, 129, 0.25);
            color: #6ee7b7;
        }

        .alert-info {
            background: rgba(59, 130, 246, 0.10);
            border-color: rgba(59, 130, 246, 0.25);
            color: #93c5fd;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .shake { animation: shake 0.45s ease; }
    </style>
</head>
<body class="text-slate-200 antialiased flex items-center justify-center p-4">
    <div class="bg-aurora"></div>

    <div id="app" v-cloak class="w-full max-w-[420px]">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-500 to-purple-600 mb-5 shadow-lg shadow-blue-500/20">
                <i data-lucide="activity" class="h-7 w-7 text-white"></i>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-white mb-1">AosiConn</h1>
            <p class="text-slate-400 text-sm">Trading Dashboard</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card p-7 sm:p-9" ref="loginCard">
            <div class="text-center mb-7">
                <h2 class="text-xl font-semibold text-white mb-1">Welcome back</h2>
                <p class="text-slate-400 text-sm">Sign in to access your dashboard</p>
            </div>

            <!-- Alert -->
            <transition name="fade">
                <div v-if="error" :class="['alert mb-6', errorClass]">
                    <i :data-lucide="errorType === 'success' ? 'check-circle' : errorType === 'info' ? 'info' : 'alert-circle'" class="h-5 w-5 flex-shrink-0"></i>
                    <span>{{ error }}</span>
                </div>
            </transition>

            <form @submit.prevent="handleLogin" class="space-y-5">
                <!-- Username -->
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Username</label>
                    <div class="input-field">
                        <i data-lucide="user" class="input-icon h-5 w-5"></i>
                        <input
                            v-model="username"
                            type="text"
                            required
                            placeholder="Enter your username"
                            :disabled="isLoading"
                            autocomplete="username"
                        >
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                    <div class="input-field">
                        <i data-lucide="lock" class="input-icon h-5 w-5"></i>
                        <input
                            v-model="password"
                            :type="showPassword ? 'text' : 'password'"
                            required
                            placeholder="Enter your password"
                            :disabled="isLoading"
                            autocomplete="current-password"
                        >
                        <button type="button" @click="showPassword = !showPassword" class="toggle-password">
                            <i :data-lucide="showPassword ? 'eye-off' : 'eye'" class="h-5 w-5"></i>
                        </button>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" :disabled="isLoading || !isValid" class="btn-primary mt-2">
                    <i v-if="isLoading" data-lucide="loader-2" class="h-5 w-5 mr-2 animate-spin"></i>
                    <i v-else data-lucide="log-in" class="h-5 w-5 mr-2"></i>
                    {{ isLoading ? 'Signing in...' : 'Sign In' }}
                </button>
            </form>

            <div class="mt-6 text-center text-xs text-slate-500">
                Secure connection established
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    username: '',
                    password: '',
                    showPassword: false,
                    isLoading: false,
                    error: null,
                    errorType: null
                }
            },

            computed: {
                isValid() {
                    return this.username.trim().length > 0 && this.password.length > 0;
                },
                errorClass() {
                    const map = {
                        error: 'alert-error',
                        success: 'alert-success',
                        info: 'alert-info'
                    };
                    return map[this.errorType] || map.error;
                }
            },

            mounted() {
                lucide.createIcons();
                this.redirectIfSessionIsValid();
            },

            methods: {
                async redirectIfSessionIsValid() {
                    try {
                        const response = await fetch('/auth/session', { credentials: 'include' });
                        const data = await response.json();
                        if (data.authenticated) {
                            window.location.href = '/dashboard';
                        }
                    } catch (error) {
                        console.error('Session validation error:', error);
                    }
                },

                async handleLogin() {
                    if (!this.isValid || this.isLoading) return;

                    this.isLoading = true;
                    this.error = null;

                    try {
                        const response = await fetch('/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            credentials: 'include',
                            body: JSON.stringify({
                                username: this.username.trim(),
                                password: this.password
                            })
                        });

                        if (response.ok) {
                            this.error = 'Login successful! Redirecting...';
                            this.errorType = 'success';
                            this.$nextTick(() => lucide.createIcons());

                            setTimeout(() => {
                                window.location.href = '/dashboard';
                            }, 500);
                        } else if (response.status === 400 || response.status === 401) {
                            this.error = 'Invalid username or password';
                            this.errorType = 'error';
                            this.shakeForm();
                        } else {
                            const errorData = await response.json().catch(() => ({}));
                            this.error = errorData.detail || 'Login failed. Please try again.';
                            this.errorType = 'error';
                        }
                    } catch (error) {
                        console.error('Login error:', error);
                        this.error = 'Connection error. Please check your network and try again.';
                        this.errorType = 'error';
                    } finally {
                        this.isLoading = false;
                        this.$nextTick(() => lucide.createIcons());
                    }
                },

                shakeForm() {
                    const card = this.$refs.loginCard;
                    if (card) {
                        card.classList.remove('shake');
                        void card.offsetWidth;
                        card.classList.add('shake');
                        setTimeout(() => card.classList.remove('shake'), 500);
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
