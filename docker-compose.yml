version: '3.8'

services:
  aosiconn:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aosiconn-trading
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persistent database storage
      - ./data/db:/app/db
      # Persistent logs
      - ./data/logs:/app/logs
      # Threads directory for strategies
      - ./data/threads:/app/threads
      # Environment file
      - ./.env:/app/.env:ro
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///db/aosiconn.db}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/internal/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - aosiconn-network

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: aosiconn-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      aosiconn:
        condition: service_healthy
    networks:
      - aosiconn-network
    profiles:
      - production

networks:
  aosiconn-network:
    driver: bridge
